services:
  db:
    image: postgres:15-alpine
    container_name: pombo-db
    restart: unless-stopped
    ports:
      - "5442:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pombo-redis
    restart: unless-stopped
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pombo-api
    ports:
      - "4444:4444"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=local
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://postgres:123123@db:5432/postgres?schema=public
    volumes:
      - ./apps/api:/usr/src/app/apps/api
      - /usr/src/app/apps/api/node_modules
    command: yarn dev

volumes:
  postgres_data:
  redis_data:
