# infra/app/docker-compose.prod.yml — API (VPS-APP)
#
# Roda a imagem da API publicada no GHCR pelo CI (.github/workflows/deploy-api.yml).
# Ver .claude/knowledge/devops.md (API na VPS-APP + CI/CD) e DEPLOY.md (comandos).
#
# A API expõe 3333 SÓ em localhost — quem publica na internet é o Caddy
# (infra/app/Caddyfile), atrás do Cloudflare.
#
# Pré-requisitos na VPS-APP: docker, túnel WireGuard ativo (DATABASE_URL/REDIS_HOST
# apontam 10.8.0.2), e o arquivo de env real ../.env.prod (chmod 600).
#
# Deploy: docker compose -f docker-compose.prod.yml pull && up -d
#
# OBS migrate: o Dockerfile.prod roda `prisma migrate deploy` no CMD/boot.
# Com 1 réplica está ok. Ao escalar p/ 2+ réplicas, tirar o migrate do CMD e
# rodá-lo como step único do deploy (corrida de migrations). Ver knowledge.

name: boilerplate-app

services:
  api:
    # Tag fixada pelo CI (:<sha>) ou :latest. Sobrescreva via API_IMAGE.
    image: ${API_IMAGE:?set API_IMAGE to your published API image}
    container_name: boilerplate-api
    restart: unless-stopped
    env_file:
      - ../.env.prod
    ports:
      - "127.0.0.1:3333:3333"   # só localhost; o Caddy expõe publicamente
    # Respeita o graceful shutdown (main.ts: SIGTERM drena filas BullMQ +
    # eventBus + flowProducer antes de fechar). Sem isso, deploy perde jobs em voo.
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # node_exporter — host metrics (CPU/RAM/disk/load). Runs in network_mode: host
  # + pid: host to read the real host's /proc and /sys; bound ONLY to the
  # WireGuard tunnel IP (10.8.0.1:9100), never exposed to the internet. The API
  # scrapes it via METRICS_APP_URL.
  node-exporter:
    image: prom/node-exporter:latest
    container_name: boilerplate-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--web.listen-address=10.8.0.1:9100"
